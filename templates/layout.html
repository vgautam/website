<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content="Vasundhara Gautam's website" />
    <meta
      name="keywords"
      content="Vasundhara Gautam, Vasundhara, computational linguistics, NLP"
    />
    <meta name="author" content="Vasundhara Gautam" />
    <link
      rel="shortcut icon"
      href="{{ url_for('static', filename='favicon.ico') }}"
    />
    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
      integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk"
      crossorigin="anonymous"
    />
    <!-- My CSS -->
    <style>
      .vg-title {
        font-size: 3.5rem;
      }
      a {
        color: #0056b3;
      }
      .navbar-nav > li > .dropdown-menu a:hover {
        background-color: #dddddd;
      }
      nav > a:hover {
        color: #a6a6a6 !important;
      }
      li.nav-item > a:hover {
        color: #a6a6a6 !important;
      }
      .jumbotron {
        background-image: url("{{ url_for('static', filename='img/map.jpg') }}");
        height: 12rem;
        width: 100%;
        background-repeat: no-repeat;
        background-size: cover;
      }
      .jumbotron .container-fluid {
        position: relative;
        text-align: center;
        vertical-align: middle;
        color: white;
      }
      .ipa-pronunciation {
        font-family: Lucida Grande, Lucida Sans Unicode, Lucida Sans, Geneva,
          Verdana, sans-serif;
      }
      /* vanilla links are fbfbfb, navbar background is 343A40, colour i want to chage is 9a9da0 */
    </style>
    <title>{% block short_title %}{% endblock %} | Vasundhara Gautam</title>
  </head>
  <body>
    <nav class="navbar navbar-expand navbar-dark bg-dark">
      <a class="navbar-brand" href="/">Vasundhara Gautam</a>
      <div>
        <ul class="navbar-nav mr-auto">
          <li class="nav-item active">
            <a class="nav-link" href="/work">Work</a>
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="/service">Service</a>
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="/recognition">Recognition</a>
          </li>
          <li class="nav-item dropdown active">
            <a
              class="nav-link dropdown-toggle"
              href="#"
              id="dropdown"
              data-toggle="dropdown"
              aria-haspopup="true"
              aria-expanded="true"
              >Interests</a
            >
            <div class="dropdown-menu" aria-labelledby="dropdown">
              <a class="dropdown-item" href="/birding">Birding</a>
              <a class="dropdown-item" href="/music">Music</a>
            </div>
          </li>
        </ul>
      </div>
    </nav>
    <header class="jumbotron jumbotron-fluid">
      <div class="container-fluid">
        <h1 class="vg-title">{% block title %}{% endblock %}</h1>
      </div>
    </header>
    {% block body %}{% endblock %}
    <br />
    <hr />
    <footer class="text-center text-lg-start">
      <div class="text-center p-3">
        <p>
          <a href="mailto:vasundhara131719@gmail.com">Email</a> |
          <a href="https://github.com/vgautam">GitHub</a> |
          <a href="https://orcid.org/0000-0002-7263-8578">ORCID</a> |
          <a href="https://www.linkedin.com/in/vasundharagautam/">LinkedIn</a> |
          <a href="https://twitter.com/VasundharaNLP">Twitter</a>
        </p>
      </div>
    </footer>
    <!-- jQuery and Bootstrap JS -->
    <script
      src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
      integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
